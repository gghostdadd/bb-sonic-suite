<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan Sciaino</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0800;
  color: #FFFFFF;
  font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: #0c0a02;
  border: 1px solid #333333;
  padding: 40px 48px;
  max-width: 540px;
  width: 100%;
}

h1 {
  font-size: 18px;
  font-weight: normal;
  letter-spacing: 3px;
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.35);
  margin-bottom: 8px;
}

.tagline {
  font-size: 12px;
  color: #777777;
  margin-bottom: 32px;
}

.section-label {
  font-size: 11px;
  color: #555555;
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.projects {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.project-link {
  display: block;
  text-decoration: none;
  color: #FFFFFF;
  border: 1px solid #555555;
  padding: 16px 20px;
  font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
  font-size: 14px;
  letter-spacing: 1px;
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.35);
  transition: background 0.15s, border-color 0.15s;
}

.project-link:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: #FFFFFF;
}

.project-name {
  font-size: 15px;
  margin-bottom: 4px;
}

.project-desc {
  font-size: 11px;
  color: #999999;
  text-shadow: none;
}
</style>
</head>
<body>
<div class="container">
  <h1>RYAN SCIAINO</h1>
  <div class="tagline">Projects and experiments</div>

  <div class="section-label">── PROJECTS ──</div>
  <div class="projects">
    <a href="suite.html" class="project-link">
      <div class="project-name">BB Sonic Suite</div>
      <div class="project-desc">Browser-based audio tools — tapedeck, sampler, and more</div>
    </a>
  </div>
</div>
</body>
</html>
