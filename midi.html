<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BB MIDI MONITOR v1.0</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0800;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

#crt {
  position: relative;
  background: #0c0a02;
  border: 1px solid #333333;
  padding: 28px 36px;
  display: flex;
  flex-direction: column;
  width: min-content;
}

#crt::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  pointer-events: none;
  z-index: 10;
}

#display {
  font-family: 'Menlo','Consolas','Courier New', monospace;
  font-size: 15px;
  line-height: 1.45;
  color: #FFFFFF;
  text-shadow: 0 0 8px rgba(255,255,255,0.35);
  white-space: pre;
  user-select: none;
}

.frame-line {
  font-family: 'Menlo','Consolas','Courier New', monospace;
  font-size: 15px;
  line-height: 1.45;
  color: #FFFFFF;
  text-shadow: 0 0 8px rgba(255,255,255,0.35);
  white-space: pre;
  user-select: none;
}

#control-panel {
  padding: 10px 16px;
  position: relative;
  z-index: 20;
  align-self: stretch;
  overflow: hidden;
}

.panel-border {
  position: absolute;
  top: 0; bottom: 0;
  overflow: hidden;
  pointer-events: none;
  margin: 0; padding: 0;
}
.panel-border-left { left: 0; }
.panel-border-right { right: 0; }

#control-panel .panel-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

#control-panel .panel-row + .panel-row { margin-top: 8px; }

.btn {
  font-family: 'Menlo','Consolas','Courier New', monospace;
  font-size: 12px;
  background: transparent;
  color: #FFFFFF;
  border: 1px solid #555555;
  padding: 6px 12px;
  cursor: pointer;
  text-shadow: 0 0 8px rgba(255,255,255,0.35);
  transition: background 0.15s, border-color 0.15s;
  letter-spacing: 1px;
}
.btn:hover { background: rgba(255,255,255,0.08); border-color: #FFFFFF; }
.btn:disabled { color: #333333; border-color: #222222; cursor: default; text-shadow: none; }
.btn:disabled:hover { background: transparent; }

.btn.filter-active {
  color: #00FF60;
  border-color: #00FF60;
  text-shadow: 0 0 12px rgba(0, 255, 96, 0.5);
  background: rgba(0, 255, 96, 0.08);
}

.btn.pause-active {
  color: #FFB000;
  border-color: #FFB000;
  text-shadow: 0 0 12px rgba(255, 176, 0, 0.5);
  background: rgba(255, 176, 0, 0.08);
  animation: pulse 1s ease-in-out infinite;
}

.btn.log-active {
  color: #00BFFF;
  border-color: #00BFFF;
  text-shadow: 0 0 12px rgba(0, 191, 255, 0.5);
  background: rgba(0, 191, 255, 0.08);
}

#control-panel label {
  font-family: 'Menlo','Consolas','Courier New', monospace;
  font-size: 11px;
  color: #FFFFFF;
  text-shadow: 0 0 8px rgba(255,255,255,0.35);
  letter-spacing: 1px;
}

.crt-select {
  font-family: 'Menlo','Consolas','Courier New', monospace;
  font-size: 11px;
  background: #0c0a02;
  color: #FFFFFF;
  border: 1px solid #555555;
  padding: 5px 6px;
  text-shadow: 0 0 8px rgba(255,255,255,0.35);
  cursor: pointer;
  outline: none;
}
.crt-select:hover { border-color: #FFFFFF; }
.crt-select option { background: #0c0a02; color: #FFFFFF; }

#midi-select { max-width: 300px; }

#control-panel input[type="color"] {
  width: 32px; height: 24px; border: 1px solid #555555; background: transparent; cursor: pointer; padding: 0;
}

.sep {
  display: inline-block; width: 1px; height: 20px; background: #555; margin: 0 4px; vertical-align: middle;
}

@keyframes pulse { 50% { opacity: 0.6; } }
@keyframes flicker { 0%, 100% { opacity: 1; } 93% { opacity: 0.92; } 94% { opacity: 1; } }
#crt { animation: flicker 8s infinite; }
</style>
</head>
<body>
<div id="crt">
  <pre id="display"></pre>
  <pre id="frame-mid" class="frame-line"></pre>
  <div id="control-panel">
    <pre id="border-left" class="frame-line panel-border panel-border-left"></pre>
    <pre id="border-right" class="frame-line panel-border panel-border-right"></pre>

    <div class="panel-row">
      <label>INPUT:</label>
      <select id="midi-select" class="crt-select" onchange="switchInput()">
        <option value="">── NO DEVICES ──</option>
      </select>
      <button class="btn" onclick="requestMidi()" style="padding:4px 8px;font-size:11px;">⟳ DETECT</button>
    </div>

    <div class="panel-row">
      <button class="btn" id="f-note" onclick="toggleFilter('note')">NOTE</button>
      <button class="btn" id="f-cc" onclick="toggleFilter('cc')">CC</button>
      <button class="btn" id="f-bend" onclick="toggleFilter('bend')">BEND</button>
      <button class="btn" id="f-prog" onclick="toggleFilter('prog')">PROG</button>
      <button class="btn" id="f-at" onclick="toggleFilter('at')">AT</button>
      <button class="btn" id="f-clk" onclick="toggleFilter('clk')">CLK</button>
      <button class="btn" id="f-sys" onclick="toggleFilter('sys')">SYS</button>
    </div>

    <div class="panel-row">
      <button class="btn" id="btn-log" onclick="toggleLog()">▼ LOG</button>
      <button class="btn" id="btn-pause" onclick="togglePause()">‖ PAUSE</button>
      <button class="btn" onclick="clearLog()">✕ CLEAR</button>
    </div>

    <div class="panel-row">
      <label>BG:</label>
      <input type="color" id="color-bg" value="#0c0a02" onchange="applyColors()">
      <label>TEXT:</label>
      <input type="color" id="color-text" value="#FFFFFF" onchange="applyColors()">
    </div>
  </div>
  <pre id="frame-bot" class="frame-line"></pre>
</div>

<script>

// ── CONSTANTS ─────────────────────────────────────
const W = 58;
const LOG_LINES = 10;
const BAR_W = 12;
const CC_BAR_W = 20;
const STAFF_W = 22;
const STAFF_CENTER = 11;
const MAX_MESSAGES = 500;

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const CC_NAMES = {
  0:'Bank', 1:'Mod', 2:'Breath', 4:'Foot', 5:'Porta', 7:'Vol',
  8:'Bal', 10:'Pan', 11:'Expr', 64:'Sust', 65:'Porta', 66:'Sosten',
  67:'Soft', 68:'Legato', 71:'Reso', 72:'Rel', 73:'Atk', 74:'Cutoff',
  75:'Decay', 76:'VibRt', 77:'VibDp', 78:'VibDl', 91:'Reverb',
  93:'Chorus', 120:'AllOff', 121:'Reset', 123:'NotOff'
};

// Staff: positions 0 (C4) through 12 (A5) — 13 rows
// Diatonic mapping: C=0 D=1 E=2 F=3 G=4 A=5 B=6
const MIDI_TO_DIATONIC = [0,0,1,1,2,3,3,4,4,5,5,6];
const MIDI_IS_SHARP    = [0,1,0,1,0,0,1,0,1,0,1,0];
const STAFF_LINE_POS   = new Set([2, 4, 6, 8, 10]); // E4 G4 B4 D5 F5
const POS_LABELS = ['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5','F5','G5','A5'];

// ── STATE ─────────────────────────────────────────
let midiAccess = null;
let currentInputIds = [];
let selectedInputId = 'all';
let inputs = [];

let messages = [];
let paused = false;
let startTime = 0;
let msgCount = 0;
let msgTimestamps = [];

let channelActivity = new Array(16).fill(0);
let clockTimes = [];
let bpm = 0;
let transportState = '';

let lastNote = null;   // { midi, vel, ch }
let lastCC = null;     // { cc, val, ch }
let lastBend = null;   // { val, ch }
let lastAT = null;     // { val, ch }
let lastPGM = null;    // { val, ch }
let logVisible = false;

let filters = {
  note: true, cc: true, bend: true, prog: true,
  at: true, clk: true, sys: false
};

let tick = 0;
let errorMsg = '';
let midiSupported = true;
let noteFlash = 0; // countdown for note head flash

// ── DISPLAY HELPERS ───────────────────────────────
function lpad(s) { return '║' + s + ' '.repeat(Math.max(0, W - s.length)) + '║'; }
function center(s) { const l = Math.floor((W - s.length) / 2); return '║' + ' '.repeat(l) + s + ' '.repeat(W - s.length - l) + '║'; }
function hBar(ch) { return '╠' + ch.repeat(W) + '╣'; }

function fmtTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  const cs = Math.floor((ms % 1000) / 10);
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0') + '.' + String(cs).padStart(2,'0');
}

function midiNoteName(midi) {
  return NOTE_NAMES[midi % 12] + (Math.floor(midi / 12) - 1);
}

function valueBar(val, max, width) {
  const filled = Math.round((val / max) * width);
  return '█'.repeat(filled) + '░'.repeat(width - filled);
}

function activityChar(level) {
  if (level > 0.7) return '█';
  if (level > 0.4) return '▓';
  if (level > 0.15) return '▒';
  if (level > 0.02) return '░';
  return '·';
}

function getMsgRate() {
  const now = performance.now();
  msgTimestamps = msgTimestamps.filter(t => now - t < 1000);
  return msgTimestamps.length;
}

// ── STAFF RENDERING ───────────────────────────────
function midiToStaffPos(midi) {
  const noteInOctave = midi % 12;
  const octave = Math.floor(midi / 12) - 1;
  return (octave - 4) * 7 + MIDI_TO_DIATONIC[noteInOctave];
}

function renderStaff(lines) {
  let noteStaffPos = null;
  let sharp = false;
  let outOfRange = '';

  if (lastNote) {
    const rawPos = midiToStaffPos(lastNote.midi);
    sharp = MIDI_IS_SHARP[lastNote.midi % 12] === 1;
    if (rawPos < 2) { noteStaffPos = 2; outOfRange = '↓'; }
    else if (rawPos > 10) { noteStaffPos = 10; outOfRange = '↑'; }
    else { noteStaffPos = rawPos; }
  }

  const noteStr = lastNote ? midiNoteName(lastNote.midi) + (outOfRange ? ' ' + outOfRange : '') : '--';
  const velStr = lastNote ? String(lastNote.vel) : '---';
  const chStr = lastNote ? String(lastNote.ch) : '--';

  // Map to 3 rows: top (high), mid, bot (low)
  let noteRow = null;
  if (noteStaffPos !== null) {
    if (noteStaffPos >= 9) noteRow = 0;
    else if (noteStaffPos >= 5) noteRow = 1;
    else noteRow = 2;
  }

  // 3 compact staff lines
  for (let row = 0; row < 3; row++) {
    const hasNote = noteRow === row;
    const arr = new Array(STAFF_W);
    for (let i = 0; i < STAFF_W; i++) arr[i] = '─';
    if (hasNote) {
      const flash = noteFlash > 0 && noteFlash % 4 < 2;
      arr[STAFF_CENTER] = flash ? '◉' : '●';
      if (sharp) arr[STAFF_CENTER - 1] = '♯';
    }

    let info = '';
    if (row === 0) info = 'NOTE: ' + noteStr;
    if (row === 1) info = 'VEL:  ' + velStr;
    if (row === 2) info = 'CH:   ' + chStr;

    const left = '    ' + arr.join('');
    const full = left + ' '.repeat(Math.max(1, W - left.length - info.length - 2)) + info;
    lines.push(lpad(full.length > W ? full.slice(0, W) : full));
  }
}

// ── CC / VEL BARS ─────────────────────────────────
function renderBars(lines) {
  const LBL_W = 12;

  // CC bar
  if (lastCC) {
    const ccName = CC_NAMES[lastCC.cc] || '';
    const label = ('CC ' + String(lastCC.cc).padStart(3,'0') + ' ' + ccName.slice(0,6)).padEnd(LBL_W);
    const bar = valueBar(lastCC.val, 127, CC_BAR_W);
    lines.push(lpad('  ' + label + bar + ' ' + String(lastCC.val).padStart(3) + '  ch ' + String(lastCC.ch).padStart(2)));
  } else {
    lines.push(lpad('  ' + 'CC ---'.padEnd(LBL_W) + '░'.repeat(CC_BAR_W) + ' ---'));
  }

  // Velocity bar
  if (lastNote) {
    const label = ('VEL ' + midiNoteName(lastNote.midi)).padEnd(LBL_W);
    const bar = valueBar(lastNote.vel, 127, CC_BAR_W);
    lines.push(lpad('  ' + label + bar + ' ' + String(lastNote.vel).padStart(3) + '  ch ' + String(lastNote.ch).padStart(2)));
  } else {
    lines.push(lpad('  ' + 'VEL --'.padEnd(LBL_W) + '░'.repeat(CC_BAR_W) + ' ---'));
  }
}

// ── BEND / AT / PGM READOUTS ─────────────────────
function renderReadouts(lines) {
  const bv = lastBend ? ((lastBend.val >= 0 ? '+' : '') + lastBend.val).padStart(6) : ' -----';
  const bc = lastBend ? String(lastBend.ch).padStart(2) : '--';
  const av = lastAT ? String(lastAT.val).padStart(3) : '---';
  const ac = lastAT ? String(lastAT.ch).padStart(2) : '--';
  const pv = lastPGM ? String(lastPGM.val).padStart(3) : '---';
  const pc = lastPGM ? String(lastPGM.ch).padStart(2) : '--';
  lines.push(lpad('  BEND' + bv + ' ch' + bc + '   AT ' + av + ' ch' + ac + '   PGM ' + pv + ' ch' + pc));
}

// ── MESSAGE FORMATTING ───────────────────────────
function formatMsg(msg) {
  const t = fmtTime(msg.time);
  const ch = msg.ch !== null ? String(msg.ch).padStart(2) : '--';
  let rest = '';

  switch (msg.type) {
    case 'NOTE_ON':
      rest = 'NOTE ON    ' + midiNoteName(msg.d1).padEnd(5) + String(msg.d2).padStart(3) + '  ' + valueBar(msg.d2, 127, BAR_W);
      break;
    case 'NOTE_OFF':
      rest = 'NOTE OFF   ' + midiNoteName(msg.d1).padEnd(5) + String(msg.d2).padStart(3);
      break;
    case 'CC': {
      const name = CC_NAMES[msg.d1] || '';
      rest = 'CC ' + String(msg.d1).padStart(3,'0') + '    ' + name.slice(0,6).padEnd(6) + String(msg.d2).padStart(3) + '  ' + valueBar(msg.d2, 127, BAR_W);
      break;
    }
    case 'BEND': {
      const sign = msg.bendVal >= 0 ? '+' : '';
      rest = 'BEND       ' + (sign + msg.bendVal).padStart(6);
      break;
    }
    case 'PROG':
      rest = 'PROG       ' + String(msg.d1).padStart(3);
      break;
    case 'CH_PRESS':
      rest = 'CH PRESS   ' + String(msg.d1).padStart(3) + '        ' + valueBar(msg.d1, 127, BAR_W);
      break;
    case 'KEY_PRESS':
      rest = 'KEY PRESS  ' + midiNoteName(msg.d1).padEnd(5) + String(msg.d2).padStart(3) + '  ' + valueBar(msg.d2, 127, BAR_W);
      break;
    case 'START':     rest = '► START'; break;
    case 'STOP':      rest = '■ STOP'; break;
    case 'CONTINUE':  rest = '► CONTINUE'; break;
    case 'SYSEX':     rest = 'SYSEX      ' + msg.byteCount + ' bytes'; break;
    case 'MTC':       rest = 'MTC QF     ' + String(msg.d1).padStart(3); break;
    case 'SPP':       rest = 'SONG POS   ' + String(msg.d1).padStart(5); break;
    case 'SONG_SEL':  rest = 'SONG SEL   ' + String(msg.d1).padStart(3); break;
    default:          rest = msg.type;
  }

  return '  ' + t + '  ' + ch + '  ' + rest;
}

// ── FILTER ────────────────────────────────────────
function passesFilter(msg) {
  switch (msg.type) {
    case 'NOTE_ON': case 'NOTE_OFF': return filters.note;
    case 'CC': return filters.cc;
    case 'BEND': return filters.bend;
    case 'PROG': return filters.prog;
    case 'CH_PRESS': case 'KEY_PRESS': return filters.at;
    case 'START': case 'STOP': case 'CONTINUE': return filters.clk;
    case 'SYSEX': case 'MTC': case 'SPP': case 'SONG_SEL': return filters.sys;
    default: return true;
  }
}

// ── RENDER ────────────────────────────────────────
const elDisplay = document.getElementById('display');
const elFrameMid = document.getElementById('frame-mid');
const elFrameBot = document.getElementById('frame-bot');
const elControlPanel = document.getElementById('control-panel');
const elBorderLeft = document.getElementById('border-left');
const elBorderRight = document.getElementById('border-right');
let cachedBorderLines = 0;
let cachedBorderStr = '';

function render() {
  tick++;
  if (noteFlash > 0) noteFlash--;

  // Decay channel activity
  for (let i = 0; i < 16; i++) channelActivity[i] *= 0.93;

  // Decay BPM if no clock for a while
  if (clockTimes.length > 0 && performance.now() - clockTimes[clockTimes.length - 1] > 2000) {
    bpm = 0; clockTimes = []; transportState = '';
  }

  const rate = getMsgRate();

  // Status
  let statusTxt;
  if (!midiSupported) statusTxt = 'NO MIDI API';
  else if (inputs.length === 0) statusTxt = 'NO DEVICES';
  else if (paused) statusTxt = '‖ PAUSED';
  else statusTxt = '● LISTENING';

  // Input name
  let inputName = 'NONE';
  if (selectedInputId === 'all' && inputs.length > 0) inputName = 'ALL (' + inputs.length + ')';
  else { const inp = inputs.find(i => i.id === selectedInputId); if (inp) inputName = inp.name; }
  const truncInput = inputName.length > 14 ? inputName.slice(0,11) + '...' : inputName;

  // BPM / Transport
  const bpmStr = bpm > 0 ? bpm.toFixed(1) : '---.-';
  let transportStr = '';
  if (transportState === 'PLAY') transportStr = '► PLAY';
  else if (transportState === 'STOP') transportStr = '■ STOP';

  // ── Build display ──
  const lines = [];

  // Header
  lines.push('╔' + '═'.repeat(W) + '╗');
  lines.push(lpad(''));
  lines.push(center('B B  M I D I  M O N I T O R  v1.0'));
  lines.push(lpad(''));
  lines.push(hBar('═'));
  lines.push(lpad(''));

  // Status section
  const rateStr = rate > 0 ? String(rate).padStart(4) + '/s' : '   0/s';
  lines.push(lpad('  INPUT: ' + truncInput.padEnd(15) + 'MSGS: ' + String(msgCount).padStart(5) + ' ' + rateStr));
  const statusPad = statusTxt.padEnd(18);
  const bpmPad = ('BPM: ' + bpmStr).padEnd(14);
  lines.push(lpad('  STATUS: ' + statusPad + bpmPad + transportStr));
  if (errorMsg) lines.push(lpad('  ' + errorMsg));
  lines.push(lpad(''));

  // Channel activity
  let chHeader = '  CH ';
  let chBars   = '     ';
  for (let i = 0; i < 16; i++) {
    chHeader += String(i + 1).padStart(3);
    chBars += ('  ' + activityChar(channelActivity[i]));
  }
  lines.push(lpad(chHeader));
  lines.push(lpad(chBars));
  lines.push(lpad(''));

  // Staff section
  lines.push(hBar('═'));
  renderStaff(lines);
  lines.push(lpad(''));

  // CC + Velocity bars + readouts
  renderBars(lines);
  renderReadouts(lines);
  lines.push(lpad(''));

  // Log section (collapsible)
  if (logVisible) {
    lines.push(hBar('─'));
    lines.push(lpad(''));

    if (messages.length === 0) {
      const emptyBefore = Math.floor((LOG_LINES - 1) / 2);
      for (let i = 0; i < emptyBefore; i++) lines.push(lpad(''));
      lines.push(center(inputs.length === 0 ? 'No MIDI devices detected' : 'Waiting for input...'));
      const emptyAfter = LOG_LINES - 1 - emptyBefore;
      for (let i = 0; i < emptyAfter; i++) lines.push(lpad(''));
    } else {
      const filtered = messages.filter(passesFilter);
      const start = Math.max(0, filtered.length - LOG_LINES);
      const display = filtered.slice(start);
      for (let i = 0; i < LOG_LINES - display.length; i++) lines.push(lpad(''));
      for (const msg of display) {
        const formatted = formatMsg(msg);
        lines.push(lpad(formatted.length > W ? formatted.slice(0, W) : formatted));
      }
    }
    lines.push(lpad(''));
  }

  elDisplay.textContent = lines.join('\n');
  elFrameMid.textContent = hBar('═');
  elFrameBot.textContent = '╚' + '═'.repeat(W) + '╝';

  // Side borders
  const lineH = 21.75;
  const numLines = Math.ceil(elControlPanel.clientHeight / lineH) + 1;
  if (numLines !== cachedBorderLines) {
    cachedBorderLines = numLines;
    cachedBorderStr = new Array(numLines).fill('║').join('\n');
  }
  elBorderLeft.textContent = cachedBorderStr;
  elBorderRight.textContent = cachedBorderStr;

  requestAnimationFrame(render);
}

// ── MIDI SETUP ────────────────────────────────────
async function requestMidi() {
  if (!navigator.requestMIDIAccess) {
    midiSupported = false;
    errorMsg = '?ERR: WEB MIDI NOT SUPPORTED';
    return;
  }
  try {
    midiAccess = await navigator.requestMIDIAccess({ sysex: false });
    midiAccess.onstatechange = onStateChange;
    populateInputs();
    connectInputs();
    startTime = performance.now();
    errorMsg = '';
  } catch (e) {
    errorMsg = '?ERR: MIDI ACCESS DENIED';
  }
}

function onStateChange() { populateInputs(); connectInputs(); }

function populateInputs() {
  if (!midiAccess) return;
  inputs = [];
  for (const input of midiAccess.inputs.values()) {
    if (input.state === 'connected') inputs.push({ id: input.id, name: input.name || 'UNKNOWN' });
  }
  const sel = document.getElementById('midi-select');
  sel.innerHTML = '';
  if (inputs.length === 0) {
    const opt = document.createElement('option');
    opt.value = ''; opt.textContent = '── NO DEVICES ──';
    sel.appendChild(opt);
    selectedInputId = '';
    return;
  }
  const allOpt = document.createElement('option');
  allOpt.value = 'all'; allOpt.textContent = 'ALL INPUTS (' + inputs.length + ')';
  sel.appendChild(allOpt);
  inputs.forEach(inp => {
    const opt = document.createElement('option');
    opt.value = inp.id;
    opt.textContent = inp.name.length > 40 ? inp.name.slice(0,37) + '...' : inp.name;
    sel.appendChild(opt);
  });
  if (selectedInputId && (selectedInputId === 'all' || inputs.find(i => i.id === selectedInputId))) {
    sel.value = selectedInputId;
  } else { selectedInputId = 'all'; sel.value = 'all'; }
}

function switchInput() { selectedInputId = document.getElementById('midi-select').value; connectInputs(); }

function connectInputs() {
  if (!midiAccess) return;
  for (const input of midiAccess.inputs.values()) input.onmidimessage = null;
  currentInputIds = [];
  if (!selectedInputId) return;
  for (const input of midiAccess.inputs.values()) {
    if (input.state !== 'connected') continue;
    if (selectedInputId === 'all' || input.id === selectedInputId) {
      input.onmidimessage = onMidiMessage;
      currentInputIds.push(input.id);
    }
  }
}

// ── MIDI MESSAGE HANDLER ──────────────────────────
function onMidiMessage(e) {
  const data = e.data;
  if (!data || data.length === 0) return;
  const status = data[0];
  const now = performance.now();

  msgTimestamps.push(now);
  msgCount++;

  if (status === 0xFE || status === 0xFF) return;

  // Clock tick — BPM only
  if (status === 0xF8) { handleClock(now); return; }

  if (paused) return;
  const time = now - startTime;

  // System messages
  if (status >= 0xF0) {
    switch (status) {
      case 0xFA: transportState = 'PLAY'; addMessage({ time, type: 'START', ch: null }); return;
      case 0xFB: transportState = 'PLAY'; addMessage({ time, type: 'CONTINUE', ch: null }); return;
      case 0xFC: transportState = 'STOP'; addMessage({ time, type: 'STOP', ch: null }); return;
      case 0xF0: addMessage({ time, type: 'SYSEX', ch: null, byteCount: data.length }); return;
      case 0xF1: addMessage({ time, type: 'MTC', ch: null, d1: data[1] || 0 }); return;
      case 0xF2: { const pos = data.length >= 3 ? ((data[2] << 7) | data[1]) : 0; addMessage({ time, type: 'SPP', ch: null, d1: pos }); return; }
      case 0xF3: addMessage({ time, type: 'SONG_SEL', ch: null, d1: data[1] || 0 }); return;
      default: return;
    }
  }

  const type = status & 0xF0;
  const ch = (status & 0x0F) + 1;
  channelActivity[ch - 1] = 1.0;

  switch (type) {
    case 0x80:
      addMessage({ time, type: 'NOTE_OFF', ch, d1: data[1], d2: data[2] });
      break;
    case 0x90:
      if (data[2] === 0) {
        addMessage({ time, type: 'NOTE_OFF', ch, d1: data[1], d2: 0 });
      } else {
        lastNote = { midi: data[1], vel: data[2], ch };
        noteFlash = 8;
        addMessage({ time, type: 'NOTE_ON', ch, d1: data[1], d2: data[2] });
      }
      break;
    case 0xA0:
      addMessage({ time, type: 'KEY_PRESS', ch, d1: data[1], d2: data[2] });
      break;
    case 0xB0:
      lastCC = { cc: data[1], val: data[2], ch };
      addMessage({ time, type: 'CC', ch, d1: data[1], d2: data[2] });
      break;
    case 0xC0:
      lastPGM = { val: data[1], ch };
      addMessage({ time, type: 'PROG', ch, d1: data[1] });
      break;
    case 0xD0:
      lastAT = { val: data[1], ch };
      addMessage({ time, type: 'CH_PRESS', ch, d1: data[1] });
      break;
    case 0xE0: {
      const bendVal = ((data[2] << 7) | data[1]) - 8192;
      lastBend = { val: bendVal, ch };
      addMessage({ time, type: 'BEND', ch, d1: data[1], d2: data[2], bendVal });
      break;
    }
  }
}

function addMessage(msg) {
  messages.push(msg);
  if (messages.length > MAX_MESSAGES) messages = messages.slice(-MAX_MESSAGES);
}

// ── BPM ───────────────────────────────────────────
function handleClock(now) {
  clockTimes.push(now);
  if (clockTimes.length > 48) clockTimes = clockTimes.slice(-48);
  if (clockTimes.length >= 6) {
    const recent = clockTimes.slice(-24);
    const totalTime = recent[recent.length - 1] - recent[0];
    const avgTickMs = totalTime / (recent.length - 1);
    bpm = 60000 / (avgTickMs * 24);
  }
}

// ── CONTROLS ──────────────────────────────────────
function toggleFilter(name) { filters[name] = !filters[name]; updateFilterButtons(); }

function updateFilterButtons() {
  for (const key of Object.keys(filters)) {
    const btn = document.getElementById('f-' + key);
    if (btn) btn.classList.toggle('filter-active', filters[key]);
  }
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btn-pause');
  btn.classList.toggle('pause-active', paused);
  btn.textContent = paused ? '► RESUME' : '‖ PAUSE';
}

function toggleLog() {
  logVisible = !logVisible;
  const btn = document.getElementById('btn-log');
  btn.classList.toggle('log-active', logVisible);
  btn.textContent = logVisible ? '▼ LOG' : '► LOG';
}

function clearLog() {
  messages = [];
  msgCount = 0;
  msgTimestamps = [];
  lastNote = null;
  lastCC = null;
  lastBend = null;
  lastAT = null;
  lastPGM = null;
  startTime = performance.now();
  bpm = 0; clockTimes = []; transportState = '';
  for (let i = 0; i < 16; i++) channelActivity[i] = 0;
}

// ── COLORS ────────────────────────────────────────
let colorStyleEl = null;

function applyColors() {
  const bg = document.getElementById('color-bg').value;
  const txt = document.getElementById('color-text').value;
  document.body.style.background = bg;
  document.getElementById('crt').style.background = bg;
  document.getElementById('display').style.color = txt;
  document.getElementById('display').style.textShadow = `0 0 8px ${txt}55`;
  document.querySelectorAll('.btn, #control-panel label, .crt-select').forEach(el => {
    el.style.color = txt; el.style.borderColor = txt + '88'; el.style.textShadow = `0 0 8px ${txt}55`;
  });
  document.querySelectorAll('.crt-select option').forEach(el => { el.style.color = txt; el.style.background = bg; });
  document.getElementById('crt').style.borderColor = txt + '33';
  document.querySelectorAll('.frame-line').forEach(el => { el.style.color = txt; el.style.textShadow = `0 0 8px ${txt}55`; });
  document.querySelectorAll('.sep').forEach(el => { el.style.background = txt + '55'; });
  document.querySelectorAll('input[type="color"]').forEach(el => { el.style.borderColor = txt + '88'; });
  if (!colorStyleEl) { colorStyleEl = document.createElement('style'); document.head.appendChild(colorStyleEl); }
  colorStyleEl.textContent = `.crt-select { accent-color: ${txt}; }`;
  updateFilterButtons();
}

// ── KEYBOARD SHORTCUTS ────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
  switch (e.key.toLowerCase()) {
    case ' ': e.preventDefault(); togglePause(); break;
    case 'c': e.preventDefault(); clearLog(); break;
    case 'l': e.preventDefault(); toggleLog(); break;
    case '1': e.preventDefault(); toggleFilter('note'); break;
    case '2': e.preventDefault(); toggleFilter('cc'); break;
    case '3': e.preventDefault(); toggleFilter('bend'); break;
    case '4': e.preventDefault(); toggleFilter('prog'); break;
    case '5': e.preventDefault(); toggleFilter('at'); break;
    case '6': e.preventDefault(); toggleFilter('clk'); break;
    case '7': e.preventDefault(); toggleFilter('sys'); break;
  }
});

document.querySelectorAll('select').forEach(el => { el.addEventListener('change', () => el.blur()); });

// ── INIT ──────────────────────────────────────────
if (!navigator.requestMIDIAccess) { midiSupported = false; errorMsg = '?ERR: WEB MIDI NOT SUPPORTED'; }
updateFilterButtons();
requestAnimationFrame(render);
requestMidi();

// ── MOBILE SCALING ───────────────────────────────
function scaleCrt() {
  const crt = document.getElementById('crt');
  crt.style.transform = '';
  crt.style.transformOrigin = 'top center';
  const p = 16;
  const crtW = crt.scrollWidth;
  const vpW = window.innerWidth;
  if (crtW + p * 2 > vpW) crt.style.transform = `scale(${(vpW - p * 2) / crtW})`;
}
window.addEventListener('resize', scaleCrt);
requestAnimationFrame(scaleCrt);

</script>
</body>
